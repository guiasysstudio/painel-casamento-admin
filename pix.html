<html lang="pt-BR"><head><meta charset="utf-8"/><meta content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover" name="viewport"/><title>PIX — Painel ADM</title><link href="assets/img/monograma.svg" rel="icon" type="image/svg+xml"/><script id="admin-menu-session-bootstrap">
(function () {
  try {
    var user = JSON.parse(
      sessionStorage.getItem("adminShellUser") || "null"
    );
    var access = JSON.parse(
      sessionStorage.getItem("adminShellAccess") || "null"
    );

    if (!user || !access || access.active !== true) return;

    var userEmail = String(user.email || "").trim().toLowerCase();
    var accessEmail = String(access.email || "").trim().toLowerCase();

    /*
     * Cache antigo sem e-mail não é usado. Depois de uma autenticação
     * com a versão 2.6.5, o cache já estará vinculado à conta correta.
     */
    if (!userEmail || !accessEmail || userEmail !== accessEmail) return;

    var root = document.documentElement;
    root.classList.add("admin-menu-session-ready");

    if (access.role === "master") {
      root.classList.add("admin-menu-master");
      return;
    }

    var permissions = access.permissions || {};

    Object.keys(permissions).forEach(function (permission) {
      if (permissions[permission] === true) {
        root.classList.add("admin-perm-" + permission);
      }
    });
  } catch (error) {
    sessionStorage.removeItem("adminShellAccess");
  }
})();
</script><link href="assets/css/admin.css?v=2.6.5" rel="stylesheet"/><link href="assets/css/admin-mobile.css?v=2.5.2" rel="stylesheet"/></head>
